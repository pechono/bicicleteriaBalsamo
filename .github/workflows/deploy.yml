name: Build y deploy

# 1) build: compila los assets y los commitea al repo.
# 2) deploy: se conecta por SSH a Hostinger y publica (git pull + copiar a
#    public_html + migrate + cache). Replica lo que hacía deploy.js a mano.
#
# NOTA: por SSH el `php artisan` SÍ funciona en Hostinger (lo deshabilitado es
# exec() desde php-fpm, no la shell). Si el push de prueba falla en el job
# "deploy" por bloqueo de IP de CI, se cae al webhook nativo de Hostinger.
#
# composer install queda MANUAL: correlo por SSH sólo cuando cambien dependencias.

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push --force origin main

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Publicar en Hostinger por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          script: |
            set -e
            APP="${{ secrets.DEPLOY_APP_PATH }}"
            PUB="${{ secrets.DEPLOY_PUBLIC_PATH }}"
            cd "$APP"
            git pull
            cp -rf "$APP/public/build/" "$PUB/build/"
            cp "$APP/public/index.php" "$PUB/index.php"
            cp "$APP/public/.htaccess" "$PUB/.htaccess"
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
