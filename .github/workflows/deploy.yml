name: Build de assets

# Hostinger DESCARTA el SSH desde las IP de GitHub Actions (i/o timeout), así que
# el deploy NO se puede correr desde CI. Esta Action solo compila los assets y los
# commitea. El deploy se hace con `node deploy.js` desde la PC (push + git pull +
# copiar a public_html + migrate + cache), o con el webhook nativo de Hostinger.

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push --force origin main
