name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push --force origin main

      - name: Deploy en Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          port: 65002
          script: |
            set -e
            cd ${{ secrets.DEPLOY_APP_PATH }}

            # Traer el último código (incluye los assets que commiteó la Action)
            git fetch origin main
            git reset --hard origin/main

            # Dependencias PHP (phpspreadsheet, pdfparser, etc.) — IMPRESCINDIBLE
            composer install --no-dev --optimize-autoloader --no-interaction

            # Migraciones y symlink de storage (idempotentes)
            php artisan migrate --force
            php artisan storage:link || true

            # Copiar el public del proyecto al docroot (public_html)
            cp -rf public/. ${{ secrets.DEPLOY_PUBLIC_PATH }}/

            # Limpiar cachés (NO route:cache: las rutas usan closures y rompería)
            php artisan optimize:clear

            echo "Deploy completado!"
