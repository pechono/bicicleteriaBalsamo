name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push --force origin main

      - name: Deploy via hook HTTP
        run: |
          echo "Llamando al hook de deploy por HTTPS (evita el SSH que Hostinger bloquea)..."
          HTTP=$(curl -sS --max-time 300 -o response.txt -w "%{http_code}" \
            "https://bicicleteriabalsamo.xyz/deploy/${{ secrets.DEPLOY_TOKEN }}")
          echo "=== Respuesta del servidor (HTTP $HTTP) ==="
          cat response.txt
          echo ""
          test "$HTTP" = "200"
