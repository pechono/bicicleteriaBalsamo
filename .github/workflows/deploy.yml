name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push

      - name: Deploy en Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          port: 65002
          script: |
            cd ${{ secrets.DEPLOY_APP_PATH }}
            git pull
            cp -rf public/build/ ${{ secrets.DEPLOY_PUBLIC_PATH }}/build/
            cp public/index.php ${{ secrets.DEPLOY_PUBLIC_PATH }}/index.php
            cp public/.htaccess ${{ secrets.DEPLOY_PUBLIC_PATH }}/.htaccess
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "Deploy completado!"
