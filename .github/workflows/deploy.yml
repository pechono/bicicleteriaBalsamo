name: Build de assets (manual)

# El deploy normal es `npm run deploy` desde la PC: compila los assets, los
# commitea ([skip ci]) y publica por SSH (git reset --hard + copiar a public_html
# + migrate + cache). Ese comando YA compila los assets, así que este workflow
# quedó SOLO en modo manual (workflow_dispatch): antes corría en cada push y
# generaba un commit de build con OTRO hash → chocaba con el build local y dejaba
# el repo desincronizado. Usalo solo si necesitás un build en la nube puntual.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build de assets
        run: npm run build

      - name: Guardar build en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/build/
          git diff --staged --quiet || git commit -m "build: assets compilados [skip ci]"
          git push --force origin main
